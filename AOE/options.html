<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AOE Settings</title>
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #171717;
      --surface-hover: #262626;
      --border: rgba(255, 255, 255, 0.07);
      --text: #ececec;
      --text-muted: #8a8a8a;
      --ok: #10b981;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 32px 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
    }

    .card {
      max-width: 440px;
      margin: 0 auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
    }

    h1 {
      margin: 0 0 4px;
      font-size: 18px;
      font-weight: 600;
    }

    .subtitle {
      margin: 0 0 20px;
      font-size: 13px;
      color: var(--text-muted);
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 500;
    }

    .field { margin-bottom: 18px; }

    input {
      width: 100%;
      padding: 9px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s ease;
    }

    input:focus { border-color: var(--text-muted); }
    input::placeholder { color: var(--text-muted); }

    button {
      padding: 9px 18px;
      background: var(--text);
      color: var(--bg);
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s ease;
    }

    button:hover { opacity: 0.85; }

    .status {
      display: inline-block;
      margin-left: 12px;
      color: var(--ok);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>AOE Settings</h1>
    <p class="subtitle">Ask Open WebUI Everywhere</p>

    <div class="field">
      <label for="iframeUrl">Open WebUI URL</label>
      <input type="text" id="iframeUrl" placeholder="http://xxx.xxx.xx.xxx">
    </div>

    <div class="field">
      <label for="targetUrl">Target Match URL</label>
      <input type="text" id="targetUrl" placeholder="http://xxx.xxx.xx.xxx/*">
    </div>

    <button id="save">Save</button>
    <span id="status" class="status"></span>
  </div>

  <script src="options.js"></script>
</body>
</html>
